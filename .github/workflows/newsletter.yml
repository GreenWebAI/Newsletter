name: Daily newsletter digest

on:
  schedule:
    # 08:00 UTC every day. Adjust the cron if you want a different morning time.
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      since_hours:
        description: "Look-back window in hours"
        required: false
        default: "24"
      dry_run:
        description: "Print the digest instead of sending email (true/false)"
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: newsletter-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build and send digest
        env:
          SINCE_HOURS: ${{ github.event.inputs.since_hours || '24' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SECURITY: ${{ secrets.SMTP_SECURITY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SUBJECT: ${{ secrets.EMAIL_SUBJECT }}
        run: python newsletter.py
